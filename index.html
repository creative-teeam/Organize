<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>整理整頓アドバイザーAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>整理整頓アドバイザーAI</h1>
</header>

<main>

  <section class="input-section">
    <h2>入力</h2>

    <label class="input-label">写真アップロード（任意）</label>
    <input type="file" id="imageInput" accept="image/*" />

    <label class="input-label">またはテキストで状況を入力</label>
    <textarea id="promptInput" placeholder="例：デスクが散らかっていて片付けたい…"></textarea>

    <label class="input-label">優先モード</label>
    <div class="radio-group">
      <label><input type="radio" name="mode" value="cheap"> 安さ重視</label>
      <label><input type="radio" name="mode" value="easy"> 簡単さ重視</label>
      <label><input type="radio" name="mode" value="beauty" checked> 美しさ重視</label>
    </div>

    <button id="generateBtn">AI提案を作る</button>
  </section>

  <section class="output-section">
    <h2>AIの提案</h2>

    <div id="analysisCard" class="card hidden"></div>
    <div id="proposalCard" class="card hidden"></div>

    <div id="imageCard" class="card hidden">
      <h3>Before / After イメージ（疑似AI）</h3>
      <div class="before-after-container">
        <div>
          <p>Before</p>
          <img id="beforeImage" />
        </div>
        <div>
          <p>After</p>
          <img id="afterImage" />
        </div>
      </div>
    </div>

  </section>

</main>

<script src="app.js"></script>

</body>
</html>
